<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Debug</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .panel {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 16px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 12px 0 6px;
      }
      input,
      button {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
      }
      button {
        margin-top: 10px;
        cursor: pointer;
        background: #2563eb;
        border-color: #2563eb;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .log {
        margin-top: 12px;
        height: 140px;
        overflow: auto;
        background: #0b1220;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
      }
      .iframe-wrap {
        height: 70vh;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
      @media (max-width: 900px) {
        .panel {
          grid-template-columns: 1fr;
        }
        .iframe-wrap {
          height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="card">
        <h1>Terminal Debug</h1>
        <p>
          Use this page to start a session and test typing. Click inside the
          terminal before typing.
        </p>
        <label for="sessionId">Session ID</label>
        <input id="sessionId" placeholder="(auto)" />
        <button id="startBtn" onclick="startSession()">
          Start Lab Session
        </button>
        <button id="openBtn" onclick="openTerminal()" disabled>
          Open Terminal
        </button>
        <div class="log" id="log"></div>
      </div>
      <div class="card">
        <div class="iframe-wrap" id="frameWrap">
          <iframe id="terminalFrame" title="Terminal"></iframe>
        </div>
      </div>
    </div>

    <script>
      // API URL updated for separate frontend deployment
      const API_URL = "http://localhost:8080";
      let currentSessionId = null;

      function log(message) {
        const el = document.getElementById("log");
        const line = document.createElement("div");
        line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        el.appendChild(line);
        el.scrollTop = el.scrollHeight;
      }

      async function startSession() {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        log("Starting lab session...");
        try {
          const response = await fetch(`${API_URL}/start-lab`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ labType: "linux" }),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          currentSessionId = data.sessionID;
          document.getElementById("sessionId").value = currentSessionId;
          document.getElementById("openBtn").disabled = false;
          log(`Session created: ${currentSessionId}`);
          log(`Terminal URL: ${data.url}`);
        } catch (err) {
          log(`Start error: ${err.message}`);
          btn.disabled = false;
        }
      }

      function openTerminal() {
        const id = document.getElementById("sessionId").value.trim();
        if (!id) {
          log("No session ID provided");
          return;
        }
        const url = `${API_URL}/terminal/${id}`;
        document.getElementById("terminalFrame").src = url;
        log(`Loaded iframe: ${url}`);
      }

      window.addEventListener("keydown", (e) => {
        log(`Keydown: ${e.key}`);
      });
    </script>
  </body>
</html>
